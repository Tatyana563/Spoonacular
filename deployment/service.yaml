apiVersion: v1
kind: Service
metadata:
  name: spoonacular-service  # Must match metadata.name for Ingress
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: spoonacular-app   # Must match labels in your Deployment
  ports:
    - protocol: TCP
      port: 80             # Port exposed inside the cluster
      targetPort: 8080     # Port your Spring Boot container listens on
