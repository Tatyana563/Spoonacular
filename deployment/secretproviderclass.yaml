apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: spoonacular-postgres
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "spoonacular/postgres"
        objectType: "secretsmanager"
        jmesPath:
          - path: username
            objectAlias: db_username
          - path: password
            objectAlias: db_password
          - path: host
            objectAlias: db_host
          - path: port
            objectAlias: db_port
          - path: dbname
            objectAlias: db_name
  secretObjects:
    - secretName: spoonacular-db-secret
      type: Opaque
      data:
        - objectName: db_username
          key: DB_USERNAME
        - objectName: db_password
          key: DB_PASSWORD
        - objectName: db_host
          key: DB_HOST
        - objectName: db_port
          key: DB_PORT
        - objectName: db_name
          key: DB_NAME
